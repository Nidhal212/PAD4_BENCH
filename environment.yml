# Conda environment for PAD4-Bench reproducibility.
# Create with: conda env create -f environment.yml
# Activate with: conda activate pad4bench

name: pad4bench
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10.19
  - pip
  - numpy>=1.24,<2.0
  - pandas>=2.0,<3.0
  - scipy>=1.10,<2.0
  - scikit-learn>=1.3,<2.0
  - matplotlib>=3.7,<4.0
  - rdkit>=2024.03.1
  - xgboost>=2.0,<3.0
  - pyyaml>=6.0
  - tqdm>=4.65
  - pip:
    - mordred>=1.2.0
    - plotly>=5.14
    # - kaleido>=0.2.1   # uncomment for static plotly export
